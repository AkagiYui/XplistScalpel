<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- Background: deep indigo -> violet, lit from top-left -->
    <linearGradient id="bg" x1="0.15" y1="0" x2="0.7" y2="1">
      <stop offset="0" stop-color="#7B6BF0"/>
      <stop offset="0.55" stop-color="#4B36C9"/>
      <stop offset="1" stop-color="#2A1B73"/>
    </linearGradient>
    <!-- Top gloss -->
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.34"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Bottom inner shade for depth -->
    <linearGradient id="shade" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#000000" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>

    <!-- Pen barrel: brushed metal -->
    <linearGradient id="barrel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBFBFD"/>
      <stop offset="0.18" stop-color="#DEDEE6"/>
      <stop offset="0.5" stop-color="#A6A6B4"/>
      <stop offset="0.55" stop-color="#9494A2"/>
      <stop offset="0.85" stop-color="#C2C2CD"/>
      <stop offset="1" stop-color="#6E6E7C"/>
    </linearGradient>
    <!-- Gold nib -->
    <linearGradient id="nib" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFEFA6"/>
      <stop offset="0.4" stop-color="#F0B945"/>
      <stop offset="0.75" stop-color="#B9821A"/>
      <stop offset="1" stop-color="#7C530E"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F6D77A"/>
      <stop offset="0.5" stop-color="#C9941F"/>
      <stop offset="1" stop-color="#8A6111"/>
    </linearGradient>
    <!-- Dark end cap -->
    <linearGradient id="cap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#45454F"/>
      <stop offset="0.5" stop-color="#2C2C34"/>
      <stop offset="1" stop-color="#1A1A20"/>
    </linearGradient>

    <!-- Drop shadow under the pen -->
    <filter id="penShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="16"/>
      <feOffset dx="6" dy="22" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <clipPath id="tileClip">
      <rect x="80" y="80" width="864" height="864" rx="230" ry="230"/>
    </clipPath>
  </defs>

  <!-- Rounded tile with lighting -->
  <g clip-path="url(#tileClip)">
    <rect x="80" y="80" width="864" height="864" fill="url(#bg)"/>
    <rect x="80" y="80" width="864" height="500" fill="url(#gloss)"/>
    <rect x="80" y="500" width="864" height="444" fill="url(#shade)"/>
  </g>
  <!-- Edge highlight -->
  <rect x="82" y="82" width="860" height="860" rx="228" ry="228" fill="none"
        stroke="#ffffff" stroke-opacity="0.22" stroke-width="4"/>
  <!-- Outer hairline -->
  <rect x="80" y="80" width="864" height="864" rx="230" ry="230" fill="none"
        stroke="#000000" stroke-opacity="0.18" stroke-width="3"/>

  <!-- Pen, rotated -42deg around center -->
  <g transform="rotate(-42 512 512)" filter="url(#penShadow)">
    <!-- Nib cone (tip on the left) -->
    <path d="M 250 462 L 168 512 L 250 562 Z" fill="url(#nib)"/>
    <!-- Nib slit -->
    <line x1="188" y1="512" x2="250" y2="512" stroke="#5A3A08" stroke-width="5" stroke-linecap="round"/>
    <!-- Gold ring / nib housing -->
    <rect x="250" y="462" width="44" height="100" fill="url(#ring)"/>
    <!-- Barrel -->
    <rect x="294" y="462" width="404" height="100" rx="12" fill="url(#barrel)"/>
    <!-- End cap -->
    <rect x="694" y="456" width="92" height="112" rx="16" fill="url(#cap)"/>
    <!-- Clip -->
    <path d="M 636 458 L 696 458 L 696 486 Q 696 496 686 496 L 646 496 Q 636 496 636 486 Z" fill="url(#barrel)"/>
    <!-- Barrel highlight strip -->
    <rect x="300" y="470" width="396" height="12" rx="6" fill="#ffffff" fill-opacity="0.55"/>
    <rect x="300" y="486" width="396" height="5" rx="2" fill="#ffffff" fill-opacity="0.22"/>
    <!-- Ring highlight -->
    <rect x="252" y="468" width="40" height="6" rx="3" fill="#ffffff" fill-opacity="0.5"/>
    <!-- Cap highlight -->
    <rect x="702" y="464" width="78" height="8" rx="4" fill="#ffffff" fill-opacity="0.25"/>
  </g>
</svg>
